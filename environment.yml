# Clean Python 3.11 environment for the full pipeline including Brainmapper/Cellfinder.
#
#   conda env create -f environment.yml      (or: mamba env create -f environment.yml)
#   conda activate mouse-brain
#   pip install -e .
#
# NOTE: This machine currently has Python 3.14 only and no conda. The BrainGlobe /
# Cellfinder stack does NOT yet support 3.14 — a dedicated 3.11 env is required.
# See README "Installation" for the exact proposed commands (do not auto-install).
name: mouse-brain
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Core scientific stack via conda for reliable binary wheels:
  - numpy>=1.24
  - scipy>=1.10
  - scikit-image>=0.21
  - tifffile>=2023.7.10
  - imagecodecs>=2023.1.23
  - dask>=2023.5.0
  - zarr>=2.14
  - pyyaml>=6.0
  - psutil>=5.9
  - pillow>=10.0
  - matplotlib>=3.7
  - pandas>=2.0
  - tqdm>=4.65
  - pytest>=7.4
  # Brainmapper / whole-brain stack via pip (installed after the env is created):
  - pip:
      - brainglobe-workflows
      - cellfinder
      - brainglobe-atlasapi
      - brainreg
      - "napari[all]"
