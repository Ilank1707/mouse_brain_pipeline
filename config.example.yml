```yaml
# Copy this file to config.yml and replace the placeholder paths.

data:
  green_signal_dir: "PATH_TO_CHANNEL_1"
  channel_2_signal_dir: "PATH_TO_CHANNEL_2"
  background_dir: null
  work_dir: "PATH_TO_WORK_DIRECTORY"

  filename_regex: 'section_(?P<section>\d+)_(?P<plane>\d+)\.tif{1,2}$'

acquisition:
  planes_per_section: 7
  voxel_size_z_um: 6.0
  voxel_size_y_um: 1.004
  voxel_size_x_um: 1.004
  cut_thickness_um: 42.0

pilot:
  first_section: 70
  number_of_sections: 1
  tile_size: 2048
  tile_overlap: 128

registration:
  orientation: null
  atlas: "allen_mouse_25um"

detection:
  backend: "cellfinder_candidates"

  minimum_cell_diameter_um: 6
  maximum_cell_diameter_um: 30

  background_sigma_um: 40
  log_sigma_min_um: 2
  log_sigma_max_um: 8

  minimum_local_robust_z: 6.0
  z_support_min_contrast: 3.0

  central_region_radius_um: 3
  background_annulus_inner_um: 8
  background_annulus_outer_um: 16
  minimum_background_pixels: 20
  padding_values: [0]

  minimum_consecutive_planes: 2
  maximum_consecutive_planes: 6
  maximum_xy_centroid_shift_um: 5

  merge_distance_xy_um: 8
  merge_distance_z_um: 12
  minimum_candidate_separation_um: 6

  maximum_elongation: 3.0

  exclude_crop_boundary_objects: true
  crop_boundary_margin_um: 15

  single_plane_manual_review: true
  single_plane_review_min_robust_z: 8.0
  single_plane_pass_min_robust_z: 12.0

  tissue_mask:
    enabled: true
    downsample_um: 25
    smoothing_sigma_um: 20
    threshold_fraction: 0.08
    closing_um: 40
    minimum_area_um2: 200000

  injection_exclusion:
    enabled: true
    automatic: true

    downsample_um: 25
    smoothing_sigma_um: 100
    intensity_percentile: 99.0
    minimum_area_um2: 50000

    core_dilation_um: 50
    analysis_exclusion_dilation_um: 150

    mask_validated: false
    maximum_mask_fraction_of_tissue: 0.25
    maximum_candidate_fraction_inside_mask: 0.90

    generation_suppression_enabled: true
    generation_suppression_dilation_um: null

    manual_rectangles: []
    manual_polygons: []             # ADD these (full-res px) to the injection mask
    # Subtracted LAST (after dilation) so a falsely-included nearby region cannot
    # be added back. Draw with scripts/edit_injection_mask.py. Candidates in the
    # removed area return to normal candidate interpretation.
    manual_non_injection_polygons: []
    injection_seed_points: []

    # Optional channel-specific settings.
    # Coordinates are full-resolution [x, y] pixels.
    #
    # green_signal:
    #   injection_seed_points:
    #     - [X_COORDINATE, Y_COORDINATE]
    #
    # channel_2_signal:
    #   injection_seed_points:
    #     - [X_COORDINATE, Y_COORDINATE]

  cellfinder:
    soma_diameter_um: 16
    max_cluster_size_um3: 100000

    ball_xy_size_um: 6
    ball_z_size_um: 15
    ball_overlap_fraction: 0.6

    soma_spread_factor: 1.4
    log_sigma_size: 0.2

    n_sds_above_mean_thresh: 10
    n_sds_above_mean_tiled_thresh: 10
    tiled_thresh_tile_size: null

    artifact_keep: true
    outlier_keep: true

    batch_size: 1
    torch_device: "cpu"

    # Optional channel-specific settings.
    #
    # green_signal:
    #   n_sds_above_mean_thresh: 10
    #
    # channel_2_signal:
    #   n_sds_above_mean_thresh: 12
    #   n_sds_above_mean_tiled_thresh: 12

  overlap_distance_um: 8

classifier:
  patch_size_xy_um: 50

  minimum_cells: 50
  minimum_artifacts: 50

  cell_probability_threshold: 0.80
  artifact_probability_threshold: 0.20

  validated: false

  group_by: spatial_tile
  spatial_tile_size_px: 512
  validation_fraction: 0.20

  random_seed: 20260625
  epochs: 20
  batch_size: 16
  learning_rate: 0.001
  num_workers: 0

candidate_recall:
  xy_tolerance_um: 8
  z_tolerance_um: 12

qc_display:
  enabled: true
  exclude_injection_core: true
  minimum_pixels: 50

  default:
    mode: "robust_tissue_percentile"
    lower_percentile: 0.5
    upper_percentile: 99.7

  green_signal:
    mode: "robust_tissue_percentile"
    lower_percentile: 0.5
    upper_percentile: 99.7

  channel_2_signal:
    mode: "fixed"
    minimum: 0
    maximum: 513

# Radial candidate distance / density analysis around the injection centre.
# Density is candidates/mm2 of tissue -- tissue area comes from the tissue mask,
# never the full ring area. Preliminary passes are NOT cells.
radial_analysis:
  enabled: false
  center_source: "manual"          # "manual" or "injection_core_centroid"
  manual_center_xy_px: null        # [x, y] full-res px (used when center_source: manual)
  bin_width_um: 100
  maximum_radius_um: null          # null -> out to the farthest tissue/candidate
  channel: "green_signal"
```
